# Static site — no build step. Netlify publishes the repo root.
[build]
  publish = "."
  command = ""

[build.environment]
  NODE_VERSION = "18"

[functions]
  directory = "netlify/functions"

# Command Center sheet data: serve it same-origin via a server-side function
# (function follows Google's redirect server-side → browser gets clean CSV,
#  no CORS, no cross-domain redirect, no extension blocking).
[[redirects]]
  from = "/sheet.csv"
  to = "/.netlify/functions/sheet"
  status = 200
  force = true

[[headers]]
  for = "/media/orbit-frames/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"
