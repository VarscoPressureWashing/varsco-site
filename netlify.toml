# Static site in /public. No package.json / npm install (that broke deploys) —
# the only function (sheet.js) has zero deps and bundles natively. Just publish /public.
[build]
  publish = "public"
  command = ""

[build.environment]
  NODE_VERSION = "18"

# Serve files as-is (no minify/bundle); post-processing was failing the deploy on the dashboard's inline JS.
[build.processing]
  skip_processing = true

[functions]
  directory = "netlify/functions"

# Command Center sheet data: serve it same-origin via a server-side function
# (function follows Google's redirect server-side → browser gets clean CSV,
#  no CORS, no cross-domain redirect, no extension blocking).
[[redirects]]
  from = "/sheet.csv"
  to = "/.netlify/functions/sheet"
  status = 200
  force = true

[[headers]]
  for = "/media/orbit-frames/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"
